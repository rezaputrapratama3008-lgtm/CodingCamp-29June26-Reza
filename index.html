<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">

  <div class="app">

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">Dashboard</span>
      </div>
      <button id="themeToggle" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="themeIconSun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg id="themeIconMoon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </header>

    <main class="grid">

      <!-- Greeting Card -->
      <section class="card card-greeting">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="dateLine">Loading date…</div>
        <div class="greeting-row">
          <h1 id="greeting">Hello</h1>
          <button id="editNameBtn" class="text-btn" title="Set your name">edit name</button>
        </div>
      </section>

      <!-- Focus Timer Card -->
      <section class="card card-timer">
        <div class="card-title-row">
          <h2>Focus Timer</h2>
          <button id="editDurationBtn" class="text-btn" title="Change timer length">set length</button>
        </div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-controls">
          <button id="startBtn" class="btn btn-primary">Start</button>
          <button id="stopBtn" class="btn btn-ghost">Stop</button>
          <button id="resetBtn" class="btn btn-ghost">Reset</button>
        </div>
      </section>

      <!-- Tasks Card -->
      <section class="card card-tasks">
        <div class="card-title-row">
          <h2>Tasks</h2>
          <button id="sortTasksBtn" class="text-btn" title="Sort tasks">sort</button>
        </div>
        <form id="taskForm" class="task-form">
          <input type="text" id="taskInput" placeholder="Add a new task…" autocomplete="off">
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
        <p id="taskWarning" class="warning-text"></p>
        <ul id="taskList" class="task-list"></ul>
        <p id="taskEmpty" class="empty-text">No tasks yet — add your first one above.</p>
      </section>

      <!-- Quick Links Card -->
      <section class="card card-links">
        <h2>Quick Links</h2>
        <form id="linkForm" class="link-form">
          <input type="text" id="linkName" placeholder="Link name" autocomplete="off">
          <input type="text" id="linkUrl" placeholder="URL" autocomplete="off">
          <button type="submit" class="btn btn-primary">Add Link</button>
        </form>
        <div id="linkList" class="link-list"></div>
      </section>

    </main>

  </div>

<script src="js/app.js"></script>
</body>
</html>
